server.port=8080
server.error.whitelabel.enabled=false
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# -----------------------------------------------------------------------------
# Persistent local database (H2 file mode)
# Data is stored in ${user.home}/.ledger/ledgerdb.mv.db so it survives:
#   - launching from any working directory
#   - moving/renaming the project folder
#   - `mvn clean` / rebuilds (since it lives outside target/)
# Override with -DLEDGER_DATA_DIR=... or env LEDGER_DATA_DIR if you want a
# custom location (e.g. to keep data inside the project).
# -----------------------------------------------------------------------------
ledger.data.dir=${LEDGER_DATA_DIR:${user.home}/.ledger}
spring.datasource.url=jdbc:h2:file:${ledger.data.dir}/ledgerdb;AUTO_SERVER=TRUE;MV_STORE=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=false
# Log schema changes so future column-missing errors appear at startup, not at runtime
spring.jpa.properties.hibernate.hbm2ddl.import_files_sql_extractor=org.hibernate.tool.schema.internal.script.MultiLineSqlScriptSourceExtractor

# H2 console available at /h2-console (disable for production)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# -----------------------------------------------------------------------------
# Caching — Caffeine in-memory cache for user lookups and AI insights.
# -----------------------------------------------------------------------------
spring.cache.type=caffeine
spring.cache.cache-names=users,aiInsights
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=15m

# -----------------------------------------------------------------------------
# Persistent session store on disk — keeps users logged in across restarts.
# -----------------------------------------------------------------------------
server.servlet.session.persistent=true
server.servlet.session.timeout=30d
server.servlet.session.cookie.max-age=30d
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.store-dir=${ledger.data.dir}/sessions
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB
ledger.upload.dir=${ledger.data.dir}/uploads

# Static resource caching — browser will cache CSS/JS/images for 7 days.
spring.web.resources.cache.cachecontrol.max-age=7d
spring.web.resources.cache.cachecontrol.cache-public=true

# Thymeleaf templates are cached in production (no hot-reload needed once
# packaged into the jar).
spring.thymeleaf.cache=true
spring.mvc.throw-exception-if-no-handler-found=true
spring.main.lazy-initialization=false

logging.level.org.springframework=WARN
logging.level.com.expense.ledger=INFO
logging.level.org.springframework.web.servlet.resource=ERROR
# Show Hibernate schema update actions (column adds/renames) so mismatches are visible
logging.level.org.hibernate.tool.schema=INFO
logging.level.org.hibernate.SQL=WARN

# App URL used for absolute links in emails
ledger.app.base-url=${LEDGER_APP_BASE_URL:http://localhost:8080}

# Mail configuration (env-driven)
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:no-reply@ledger.local}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:false}

# -----------------------------------------------------------------------------
# AI providers (priority: Gemini -> Groq -> local heuristic fallback)
# If none are set, the app uses a built-in heuristic (no network calls).
# -----------------------------------------------------------------------------
ledger.ai.gemini.api-key=${LEDGER_AI_GEMINI_API_KEY:}
ledger.ai.gemini.model=gemini-2.5-flash
ledger.ai.groq.api-key=${LEDGER_AI_GROQ_API_KEY:}
ledger.ai.groq.model=llama-3.3-70b-versatile
ledger.remember-me.key=${LEDGER_REMEMBER_ME_KEY:ledger-dev-remember-me-key-change-in-prod}

# Storage configuration
ledger.storage.receipts-dir=./data/receipts
ledger.storage.voice-dir=./data/voice
