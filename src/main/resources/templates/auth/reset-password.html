<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head th:replace="~{fragments/fragments :: head('Reset password')}"></head>
<body>

<div class="noise"></div>

<main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:2">
  <div class="glass p-8 w-full" style="max-width:460px">

    <a th:href="@{/}" class="flex items-center gap-2 mb-8" style="text-decoration:none">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,var(--accent),var(--accent-2))">
        <span class="font-display text-lg" style="color:white">L</span>
      </div>
      <span class="font-semibold" style="color:var(--text-0)">Ledger<span style="color:var(--accent)">.</span></span>
    </a>

    <h1 class="font-display text-4xl mb-2" style="color:var(--text-0);letter-spacing:-0.03em">Set a new password</h1>
    <p class="muted mb-7">Choose a strong password with upper/lowercase letters and at least one number.</p>

    <div th:if="${flashError}" class="toast error mb-5" role="alert" th:text="${flashError}">Error</div>

    <form th:action="@{/reset-password}" method="post" th:object="${resetForm}" autocomplete="off">
      <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="token" th:field="*{token}"/>

      <div class="mb-4">
        <label class="label" for="newPassword">New password</label>
        <input class="input" type="password" id="newPassword" name="newPassword" th:field="*{newPassword}" required minlength="8" autocomplete="new-password"/>
      </div>

      <div class="mb-5">
        <label class="label" for="confirmPassword">Confirm password</label>
        <input class="input" type="password" id="confirmPassword" name="confirmPassword" th:field="*{confirmPassword}" required minlength="8" autocomplete="new-password"/>
      </div>

      <button type="submit" class="btn btn-primary w-full">Reset password</button>
    </form>

    <div class="divider"></div>

    <p class="text-sm muted text-center">
      Back to <a th:href="@{/login}" class="link-accent">sign in</a>
    </p>

  </div>
</main>

<div class="toast-host" id="toastHost"></div>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
