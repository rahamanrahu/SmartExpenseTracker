<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head th:replace="~{fragments/fragments :: head('Two-Factor Verification')}"></head>
<body>

<div class="noise"></div>
<div class="auth-split">
  <div class="flex flex-col justify-between p-8 md:p-12" style="position:relative;z-index:2">
    <a th:href="@{/}" class="flex items-center gap-2 w-fit" style="text-decoration:none">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,var(--accent),var(--accent-2))">
        <span class="font-display text-lg" style="color:white">L</span>
      </div>
      <span class="font-semibold" style="color:var(--text-0)">Ledger<span style="color:var(--accent)">.</span></span>
    </a>

    <div class="w-full max-w-sm mx-auto py-12">
      <h1 class="font-display text-4xl mb-2" style="color:var(--text-0);letter-spacing:-0.03em">Security check.</h1>
      <p class="muted mb-8">Enter the 6-digit code from your authenticator app to continue.</p>

      <div th:if="${flashError}" class="toast error mb-5" role="alert" th:text="${flashError}">Invalid code</div>
      <div th:if="${flashSuccess}" class="toast success mb-5" role="status" th:text="${flashSuccess}">Verified</div>

      <form th:action="@{/2fa-challenge}" method="post" th:object="${twoFactorCodeForm}" autocomplete="one-time-code">
        <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-4">
          <label class="label" for="code">Verification code</label>
          <input class="input" type="text" id="code" name="code" th:field="*{code}" required
                 inputmode="numeric" pattern="[0-9]{6}" maxlength="6" minlength="6"
                 placeholder="123456" autofocus/>
        </div>

        <button type="submit" class="btn btn-primary w-full">Verify and continue</button>
      </form>

      <form th:action="@{/logout}" method="post" class="mt-3">
        <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-ghost w-full">Sign out</button>
      </form>
    </div>

    <div class="text-xs dim">© 2026 Ledger · Secure access enabled</div>
  </div>

  <div class="auth-visual flex items-center justify-center p-12">
    <div class="relative z-10 max-w-md">
      <div class="chip chip-info mb-6">Two-factor authentication</div>
      <h2 class="font-display text-5xl mb-5" style="color:var(--text-0);letter-spacing:-0.03em;line-height:1.05">
        One more step to keep your account safe.
      </h2>
      <p class="text-base muted mb-8">Your password is correct. We just need to verify your device.</p>
    </div>
  </div>
</div>

<div class="toast-host" id="toastHost"></div>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
