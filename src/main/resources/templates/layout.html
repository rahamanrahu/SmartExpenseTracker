<!DOCTYPE html>
<!--
  Base layout for authenticated app pages.
  Usage from a page template:

    <html xmlns:th="http://www.thymeleaf.org"
          th:replace="~{layout :: layout('Dashboard','dashboard','Your money, at a glance')}">
    <body>
      <section th:fragment="content"> ... your page content ... </section>
      <th:block th:fragment="scripts"> ... page-specific <script> tags ... </th:block>
    </body>
    </html>
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-theme="dark" th:fragment="layout(title, activeNav, subtitle)">
<head>
  <script th:inline="javascript">
    /* Inject server theme before CSS to prevent FOUC */
    (function(){
      var t = /*[[${user != null ? user.theme : 'dark'}]]*/ 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <th:block th:replace="~{fragments/fragments :: head(${title})}"></th:block>
</head>
<body>

  <div class="noise" aria-hidden="true"></div>

  <!-- Sidebar (server-rendered) -->
  <th:block th:replace="~{fragments/fragments :: sidebar(${activeNav})}"></th:block>

  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

  <!-- Main column -->
  <main class="app-main" id="appMain">
    <th:block th:replace="~{fragments/fragments :: topbar(${title}, ${subtitle})}"></th:block>

    <div class="app-content">
      <!-- Flash messages (success / error from redirect) -->
      <div th:if="${flashSuccess}" class="toast success fade-up" role="status" style="margin-bottom:16px" th:text="${flashSuccess}">Saved</div>
      <div th:if="${flashError}" class="toast error fade-up" role="alert" style="margin-bottom:16px" th:text="${flashError}">Something went wrong</div>

      <!-- Page content injected here -->
      <th:block th:replace="~{::content}"></th:block>

      <!-- Page footer -->
      <th:block th:replace="~{fragments/fragments :: footer}"></th:block>
    </div>
  </main>

  <!-- Floating button + modals (dedup hosts for JS) -->
  <th:block th:replace="~{fragments/fragments :: fab}"></th:block>
  <th:block th:replace="~{fragments/fragments :: modalAddExpense}"></th:block>
  <th:block th:replace="~{fragments/fragments :: modalConfirm}"></th:block>

  <!-- Dynamic host for JS-mounted modals/toasts -->
  <div id="modalHost"></div>
  <th:block th:replace="~{fragments/fragments :: toasts}"></th:block>

  <!-- Core scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script th:src="@{/js/app.js}" src="/js/app.js"></script>

  <!-- Boot app (hook up interactions) -->
  <script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', function () {
      initApp(
        /*[[${activeNav}]]*/ 'dashboard',
        /*[[${title}]]*/ 'Dashboard',
        /*[[${subtitle}]]*/ ''
      );
      // Fire flash messages as toasts too
      var ok = /*[[${flashSuccess}]]*/ null;
      var err = /*[[${flashError}]]*/ null;
      if (ok && typeof toast === 'function') toast('success', ok);
      if (err && typeof toast === 'function') toast('error', err);
    });
    /*]]>*/
  </script>

  <!-- Page-specific scripts -->
  <th:block th:replace="~{::scripts}"></th:block>

</body>
</html>
